  <style>
    :root {
      --page-padding: 10px;
      --site-font-size: 18px;
      --site-line-height: 1.1;
      --site-letter-spacing: 1px;
      --site-color: #000000;
      --color-about: #000000;
      --color-archive: #000000;
      --color-event-title: #000000;
      --color-event-text: #000000;
      --color-menu: #000000;
      --bg-about: #ffffff;
      --bg-archive: #ffffff;
      --bg-event: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #fff;
      font-family: Arial, sans-serif;
      font-size: var(--site-font-size);
      line-height: var(--site-line-height);
      letter-spacing: var(--site-letter-spacing);
      color: var(--site-color);
    }

    .layout {

      flex-direction: column;
      width: 100vw;
    }

    .home-section {

      width: 100%;
    }

    .home-row {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .info-col {
      width: 100%;
    }

    .menu-col {
      width: 100%;
      position: relative;
    }

    .about-overlay {
      display: block;
      position: relative;
      margin: var(--page-padding) var(--page-padding) 0 var(--page-padding);
      max-width: 720px;
      color: var(--color-about);
      background: var(--bg-about);
    }

    .about-overlay p {
      margin-bottom: 16px;
    }

    .about-overlay p:last-child {
      margin-bottom: 0;
    }

    .about-highlight {
      cursor: pointer;
      text-decoration: underline;
    }

    .archive-section {
      display: none;
      position: relative;
      width: 100%;
    }

    .archive-close {
      margin-left: auto;
      text-decoration: none;
      cursor: pointer;
      color: #000000 !important;
    }

    #archiveClose {
      display: none;
    }

    .archive-detail-top-row {
      display: flex;
      align-items: center;
      width: 100%;
      background: var(--bg-event);
    }

    #detailClose {
      margin-left: auto;
    }

    .archive-section.visible {
      display: block;
    }

    .menu-bar {
      display: flex;
      align-items: center;
      padding: 0 var(--page-padding);
      border-top: 1px solid #ccc;
      border-bottom: 1px solid #ccc;
      margin: 0;
    }

    .menu-container {
      position: relative;
      width: auto;
      max-width: 100%;
    }

    .menu-nav-wrap {
      position: relative;
      height: auto;
    }

    .content-container {
      display: none;
      width: 100%;
      background: var(--bg-event);
      padding: 0 var(--page-padding);
      gap: 0;
    }

    .content-container.visible {
      display: flex;
      flex-direction: column;
    }

    .content-body-row {
      display: flex;
      flex-direction: row;
    }

    .content-media-col {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 60%;
      align-self: flex-start;
    }

    .content-gallery-col {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      height: 25vh;
    }

    .content-gallery-col-auto {
      height: auto;
    }

    .content-gallery-strip {
      display: flex;
      flex-direction: row;
      height: calc(25vh - 24px);
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .content-gallery-strip-item {
      position: relative;
      cursor: pointer;
      display: block;
      flex: 0 0 auto;
      height: 100%;
    }

    .content-gallery-strip-item img {
      display: block;
      width: auto;
      height: 100%;
      object-fit: contain;
    }

    .content-gallery-horizontal {
      position: relative;
      cursor: pointer;
      display: block;
      width: 100%;
    }

    .content-gallery-horizontal img {
      display: block;
      width: 100%;
      height: auto;
    }

    .content-image-count {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 0;
    }

    .content-text-col {
      width: 40%;
      min-width: 0;
      padding-right: 20px;
      margin-top: 0;
    }

    svg {
      cursor: default;
      user-select: none;
      overflow: visible;
    }

    .nav-static {
      display: flex;
      flex-direction: row;

    }

    }

    .archive-header {

    }

    }

    .archive-header .archive-title {
      flex: 0 0 340px;
    }

    .archive-header .archive-authors {
      flex: 0 0 380px;
    }

    .archive-header .archive-number {
      flex: 0 0 30px;
    }

    .archive-row {
      width: 100%;
      border-bottom: 1px solid #ccc;
    }

    .archive-item {
      display: flex;
      gap: 24px;
      padding: 0 10px 0 0;
      text-decoration: none;
      color: var(--color-archive);
    }

    .archive-item .archive-date {
      flex: 0 0 220px;
    }

    .archive-item .archive-authors {
      flex: 0 0 380px;
    }

    .archive-item .archive-title {
      flex: 0 0 340px;
    }

    .archive-item .archive-number {
      flex: 0 0 30px;

    .archive-item.active {

  <script>
    const devPanel = document.getElementById('devPanel');
    document.addEventListener('keydown', (e) => {
      if (e.key === 'd' || e.key === 'D') {
        devPanel.classList.toggle('visible');
      }
    });

    const SANITY_PROJECT_ID = 'jvmgvacm';
    const SANITY_DATASET = 'production';

    const homeSection = document.getElementById('homeSection');
    const archiveSection = document.getElementById('archiveSection');
    document.getElementById('archiveClose').addEventListener('click', (e) => {
      e.preventDefault();
      archiveSection.classList.remove('visible');
      archiveDetail.classList.remove('visible');
      navigate('home');
    });
    const archiveView = document.getElementById('archiveView');
    const archiveLoading = document.getElementById('archiveLoading');
    const archiveList = document.getElementById('archiveList');
    const archiveDetail = document.getElementById('archiveDetail');
    const navStatic = document.getElementById('navStatic');
    const navLinksOriginalOrder = Array.from(navStatic.children);

    let archiveLoaded = false;
    let currentView = 'home';
    let archiveEvents = [];
    let pendingSlug = null;

    function parsePath(path) {
      const parts = path.replace(/\/+$/, '').split('/').filter(Boolean);
      if (parts[0] === 'archive') {
        return { view: 'archive', slug: parts[1] || null };
      }
      return { view: 'home', slug: null };
    }

    function pathForRoute(view, slug) {
      if (view === 'archive') return slug ? `/archive/${slug}` : '/archive';
      return '/';
    }

    function scrollToArchive(behavior) {
      archiveSection.scrollIntoView({ behavior, block: 'start' });
    }

    function setView(view, { scroll = 'smooth' } = {}) {
      currentView = view;
      navLinksOriginalOrder.forEach((a) => {
        a.classList.toggle('active', a.dataset.view === view && view !== 'home');
      });
      const activeLink = navLinksOriginalOrder.find((a) => a.classList.contains('active'));
      const ordered = activeLink
        ? [activeLink, ...navLinksOriginalOrder.filter((a) => a !== activeLink)]
        : navLinksOriginalOrder;
      ordered.forEach((a) => navStatic.appendChild(a));
      if (view === 'archive') {
        archiveSection.classList.add('visible');
        if (!archiveLoaded) loadArchive();
      } else {
        archiveSection.classList.remove('visible');
        archiveDetail.classList.remove('visible');
      }
      document.getElementById('archiveClose').style.display = view === 'archive' ? 'block' : 'none';
      if (scroll) {
        if (view === 'archive') {
          scrollToArchive(scroll);
        } else {
          homeSection.scrollIntoView({ behavior: scroll, block: 'start' });
        }
      }
    }

    function navigate(view, { replace, scroll = 'smooth' } = {}) {
      setView(view, { scroll });
      const path = pathForRoute(view, null);
      if (location.pathname !== path) {
        if (replace) {
          history.replaceState({ view }, '', path);
        } else {
          history.pushState({ view }, '', path);
        }
      }
    }

    function applyRoute(path, { isInitial } = {}) {
      const { view, slug } = parsePath(path);
      if (view === 'archive' && slug && !archiveEvents.length) {
        pendingSlug = slug;
      }
      setView(view, { scroll: isInitial ? 'auto' : 'smooth' });
      if (view === 'archive' && slug && archiveEvents.length) {
        openEventBySlug(slug, { updateUrl: false });
      }
    }

    window.addEventListener('popstate', () => {
      applyRoute(location.pathname);
    });

    async function loadArchive() {
      archiveLoaded = true;
      const query = encodeURIComponent(`*[_type == "event"] | order(date desc){
        title,
        date,
        "slug": slug.current,
        "venue": venue->title,
        "curatedBy": curatedBy->name,
        "authors": authors[]->name,
        text[]{
          ...,
          markDefs[]{...},
          _type == "image" => { ..., "url": asset->url }
        },
        galleries[]{
          name,
          type,
          images[]{ ..., "url": asset->url }
        }
      }`);
      const url = `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}?query=${query}`;
      try {
        const res = await fetch(url);
        const { result } = await res.json();
        archiveEvents = result || [];
        renderArchive(archiveEvents);
        if (pendingSlug) {
          openEventBySlug(pendingSlug, { updateUrl: false });
          pendingSlug = null;
        } else if (currentView === 'archive') {
          scrollToArchive('smooth');
        }
      } catch (err) {
        archiveLoading.textContent = 'Could not load archive.';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    const RU_MONTHS = [
      'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
      'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря',
    ];

    function fmtDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      const monthName = RU_MONTHS[Number(m) - 1] || m;
      return `${Number(day)} ${monthName} ${y}`;
    }

    function hasContent(e) {
      return (e.text && e.text.length > 0) || (e.galleries && e.galleries.length > 0);
    }

    function renderArchive(events) {
      archiveLoading.style.display = 'none';
      if (!events.length) {
        archiveList.innerHTML = '<div class="archive-empty">No events yet.</div>';
        return;
      }
      archiveList.innerHTML = events
        .map((e, i) => {
          const authors = (e.authors || []).filter(Boolean).join(', ');
          const parts = [authors, e.venue].filter(Boolean).join(' — ');
          const active = true;
          const tag = 'a';
          const href = e.slug ? ` href="/archive/${escapeHtml(e.slug)}"` : ` href="#"`;
          const firstGalleryImage = ((e.galleries || [])[0] || {}).images || [];
          const firstImage = firstGalleryImage[0];
          const hasImage = Boolean(firstImage && firstImage.url);
          const rowStyle = hasImage ? ` style="--row-image: url('${imageUrl(firstImage.url, 988)}');"` : '';
          return `
            <div class="archive-row">
              <${tag} class="archive-item${active ? ' active' : ''}${hasImage ? ' has-image' : ''}" data-index="${i}"${href}${rowStyle}>
                <div class="archive-number">${i + 1}</div>
                <div class="archive-title" style="margin-left: ${(i + 1) * 20}px;">${escapeHtml(e.title)}</div>
                <div class="archive-authors">${escapeHtml(parts)}</div>
                <div class="archive-date">${fmtDate(e.date)}</div>
              </${tag}>
            </div>
          `;
        })
        .join('');

      archiveList.querySelectorAll('.archive-item.active').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          selectEvent(Number(el.dataset.index));
        });
      });
    }

    function openEventBySlug(slug, { updateUrl } = {}) {
      const idx = archiveEvents.findIndex((e) => e.slug === slug);
      if (idx >= 0) selectEvent(idx, { updateUrl });
    }

    function selectEvent(index, { updateUrl = true } = {}) {
      const e = archiveEvents[index];
      if (!e) return;

      archiveList.querySelectorAll('.archive-item').forEach((el) => {
        el.classList.toggle('selected', Number(el.dataset.index) === index);
      });

      if (updateUrl && e.slug) {
        const path = `/archive/${e.slug}`;
        if (location.pathname !== path) {
          history.pushState({ view: 'archive', slug: e.slug }, '', path);
        }
      }

      const authors = (e.authors || []).filter(Boolean).join(', ');

      const bodyHtml = renderPortableText(e.text || []);

      function galleryBlockHtml(images, name, type, index) {
        const nameHtml = name ? `<span class="content-gallery-name">${escapeHtml(name)}</span>` : '';

        if (type === 'photoHorizontal') {
          return `
            <div class="content-gallery-col content-gallery-col-auto" data-gallery-index="${index}">
              <div class="content-gallery-horizontal" data-gallery-index="${index}" data-image-index="0">
                <img src="${imageUrl(images[0].url, 1800)}" alt="">
              </div>
              <div class="content-image-count">${nameHtml}</div>
            </div>
          `;
        }

        const stripItems = images
          .map((img, imgIndex) => `
            <div class="content-gallery-strip-item" data-gallery-index="${index}" data-image-index="${imgIndex}">
              <img src="${imageUrl(img.url, 1800)}" alt="">
            </div>
          `)
          .join('');
        return `
          <div class="content-gallery-col" data-gallery-index="${index}">
            <div class="content-gallery-strip">
              ${stripItems}
            </div>
            <div class="content-image-count">${nameHtml}</div>
          </div>
        `;
      }

      const galleries = (e.galleries || []).filter((g) => g.images && g.images.length);
      const galleryBlocksHtml = galleries
        .map((g, gi) => galleryBlockHtml(g.images, g.name, g.type, gi))
        .join('');

      archiveDetail.innerHTML = `
        <div class="archive-detail-top-row">
          <div class="archive-detail-lines">
            <div class="archive-detail-line archive-detail-title">${escapeHtml(e.title)}</div>
            <div class="archive-detail-line archive-detail-date">${fmtDate(e.date)}</div>
            ${authors ? `<div class="archive-detail-line archive-detail-authors">${escapeHtml(authors)}</div>` : ''}
          </div>
          <a href="#" class="archive-close" id="detailClose">Close</a>
        </div>
        <div class="content-body-row">
          <div class="content-text-col">
            <div class="archive-detail-spacer"></div>
            <div class="archive-detail-body hyphenate" lang="ru">${bodyHtml}</div>
          </div>
          <div class="content-media-col">
            ${galleryBlocksHtml}
          </div>
        </div>
      `;

      archiveDetail.querySelectorAll('.content-gallery-strip-item, .content-gallery-horizontal').forEach((item) => {
        const gi = Number(item.dataset.galleryIndex);
        const imgIndex = Number(item.dataset.imageIndex);
        item.addEventListener('click', () => openCarousel(galleries[gi].images, imgIndex));
      });

      if (window.Hyphenopoly && Hyphenopoly.hyphenators && Hyphenopoly.hyphenators.ru) {
        Hyphenopoly.hyphenators.ru.then((hyphenateRU) => {
          const el = archiveDetail.querySelector('.archive-detail-body');
          if (el) hyphenateRU(el);
        });
      }

      document.getElementById('detailClose').addEventListener('click', (e) => {
        e.preventDefault();
        archiveDetail.classList.remove('visible');
        archiveList.querySelectorAll('.archive-item').forEach((el) => el.classList.remove('selected'));
      });

      archiveDetail.classList.add('visible');
      const topRowEl = archiveDetail.querySelector('.archive-detail-top-row');
      (topRowEl || archiveDetail).scrollIntoView({ behavior: 'smooth', block: 'start' });
      updateDetailTopHeight();
    }

    function updateDetailTopHeight() {
      const topRow = archiveDetail.querySelector('.archive-detail-top-row');
      if (topRow) {
        document.documentElement.style.setProperty('--detail-top-height', `${topRow.offsetHeight}px`);
      }
    }

    window.addEventListener('resize', updateDetailTopHeight);

    function imageUrl(url, width) {
      if (!url) return '';
      return width ? `${url}?w=${width}&q=90&auto=format` : url;
    }

    const carousel = document.getElementById('carousel');
    const carouselImage = document.getElementById('carouselImage');
    const carouselCounter = document.getElementById('carouselCounter');
    const carouselClose = document.getElementById('carouselClose');
    const carouselPrev = document.getElementById('carouselPrev');
    const carouselNext = document.getElementById('carouselNext');

    let carouselImages = [];
    let carouselIndex = 0;

    function openCarousel(images, startIndex) {
      if (!images.length) return;
      carouselImages = images;
      carouselIndex = startIndex;
      showCarouselImage();
      carousel.classList.add('visible');
    }

    function closeCarousel() {
      carousel.classList.remove('visible');
    }

    function showCarouselImage() {
      const img = carouselImages[carouselIndex];
      carouselImage.src = imageUrl(img.url, 1600);
      carouselCounter.textContent = `${carouselIndex + 1} / ${carouselImages.length}`;
    }

    function carouselStep(delta) {
      carouselIndex = (carouselIndex + delta + carouselImages.length) % carouselImages.length;
      showCarouselImage();
    }

    carouselClose.addEventListener('click', closeCarousel);
    carouselPrev.addEventListener('click', () => carouselStep(-1));
    carouselNext.addEventListener('click', () => carouselStep(1));
    carousel.addEventListener('click', (e) => {
      if (e.target === carousel) closeCarousel();
    });

    document.addEventListener('keydown', (e) => {
      if (!carousel.classList.contains('visible')) return;
      if (e.key === 'Escape') closeCarousel();
      if (e.key === 'ArrowLeft') carouselStep(-1);
      if (e.key === 'ArrowRight') carouselStep(1);
    });

    function renderSpan(child, markDefs) {
      let text = escapeHtml(child.text || '').replace(/\n/g, '<br>');
      if (child.marks && child.marks.length) {
        child.marks.forEach((mark) => {
          if (mark === 'strong') text = `<strong>${text}</strong>`;
          else if (mark === 'em') text = `<em>${text}</em>`;
          else if (mark === 'underline') text = `<u>${text}</u>`;
          else {
            const def = (markDefs || []).find((d) => d._key === mark);
            if (def && def._type === 'link' && def.href) {
              const target = def.blank ? ' target="_blank" rel="noopener"' : '';
              text = `<a href="${escapeHtml(def.href)}"${target}>${text}</a>`;
            }
          }
        });
      }
      return text;
    }

    function renderPortableText(blocks) {
      let html = '';
      let listOpen = null;

      const closeList = () => {
        if (listOpen) {
          html += listOpen === 'bullet' ? '</ul>' : '</ol>';
          listOpen = null;
        }
      };

      blocks.forEach((block) => {
        if (block._type === 'image') {
          closeList();
          html += `<img src="${imageUrl(block.url, 800)}" alt="">`;
          return;
        }
        if (block._type !== 'block') return;

        const listItem = block.listItem;
        if (listItem) {
          if (listOpen !== listItem) {
            closeList();
            html += listItem === 'bullet' ? '<ul>' : '<ol>';
            listOpen = listItem;
          }
          const inner = (block.children || []).map((c) => renderSpan(c, block.markDefs)).join('');
          html += `<li>${inner}</li>`;
          return;
        }

        closeList();
        const inner = (block.children || []).map((c) => renderSpan(c, block.markDefs)).join('');
        const tag = { h2: 'h2', h3: 'h3', blockquote: 'blockquote' }[block.style] || 'p';
        html += `<${tag}>${inner}</${tag}>`;
      });

      closeList();
      return html;
    }

    const aboutOverlay = document.getElementById('aboutOverlay');

    async function loadAbout() {
      const query = encodeURIComponent(`*[_id == "about"][0]{
        text[]{
          ...,
          markDefs[]{...},
          _type == "image" => { ..., "url": asset->url }
        }
      }`);
      const url = `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}?query=${query}`;
      try {
        const res = await fetch(url);
        const { result } = await res.json();
        const html = renderPortableText((result && result.text) || []);
        aboutOverlay.innerHTML = html.replace(
          /139 Documentary Center/g,
          '<span class="about-highlight">139 Documentary Center</span>'
        );
        aboutOverlay.querySelectorAll('.about-highlight').forEach((el) => {
          el.addEventListener('click', () => {
            archiveSection.classList.remove('visible');
            archiveDetail.classList.remove('visible');
            navigate('home');
          });
        });
      } catch (err) {
        aboutOverlay.innerHTML = '<p>Could not load About.</p>';
      }
    }

    loadAbout();

    navStatic.querySelectorAll('a').forEach((a) => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(a.dataset.view);
      });
    });

    const redirectPath = sessionStorage.getItem('redirectPath');
    if (redirectPath) {
      sessionStorage.removeItem('redirectPath');
      history.replaceState(null, '', redirectPath);
    }
    applyRoute(location.pathname, { isInitial: true });

    function downloadMarkdown(filename, content) {
      const blob = new Blob([content], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- Site typography controls ---
    const siteFontSize = document.getElementById('siteFontSize');
    const siteLineHeight = document.getElementById('siteLineHeight');
    const siteLetterSpacing = document.getElementById('siteLetterSpacing');
    const siteColor = document.getElementById('siteColor');

    const siteFontSizeVal = document.getElementById('siteFontSizeVal');
    const siteLineHeightVal = document.getElementById('siteLineHeightVal');
    const siteLetterSpacingVal = document.getElementById('siteLetterSpacingVal');
    const siteColorVal = document.getElementById('siteColorVal');

    siteFontSize.addEventListener('input', () => {
      document.documentElement.style.setProperty('--site-font-size', `${siteFontSize.value}px`);
      siteFontSizeVal.textContent = siteFontSize.value;
      updateDetailTopHeight();
    });

    siteLineHeight.addEventListener('input', () => {
      document.documentElement.style.setProperty('--site-line-height', siteLineHeight.value);
      siteLineHeightVal.textContent = Number(siteLineHeight.value).toFixed(2);
      updateDetailTopHeight();
    });

    siteLetterSpacing.addEventListener('input', () => {
      document.documentElement.style.setProperty('--site-letter-spacing', `${siteLetterSpacing.value}px`);
      siteLetterSpacingVal.textContent = Number(siteLetterSpacing.value).toFixed(2);
      updateDetailTopHeight();
    });

    const HEX_COLOR_RE = /^#[0-9a-f]{6}$/i;

    function wireColorPair(colorInput, hexInput, cssVar) {
      colorInput.addEventListener('input', () => {
        document.documentElement.style.setProperty(cssVar, colorInput.value);
        hexInput.value = colorInput.value;
      });
      hexInput.addEventListener('input', () => {
        if (!HEX_COLOR_RE.test(hexInput.value)) return;
        colorInput.value = hexInput.value;
        document.documentElement.style.setProperty(cssVar, hexInput.value);
        colorInput.dispatchEvent(new Event('change'));
        saveSettings();
      });
    }

    wireColorPair(siteColor, siteColorVal, '--site-color');

    // --- Section colors ---
    const SECTION_COLORS = [
      { id: 'colorAbout', cssVar: '--color-about' },
      { id: 'colorArchive', cssVar: '--color-archive' },
      { id: 'colorEventTitle', cssVar: '--color-event-title' },
      { id: 'colorEventText', cssVar: '--color-event-text' },
      { id: 'colorMenu', cssVar: '--color-menu' },
      { id: 'bgAbout', cssVar: '--bg-about' },
      { id: 'bgArchive', cssVar: '--bg-archive' },
      { id: 'bgEvent', cssVar: '--bg-event' },
    ];

    SECTION_COLORS.forEach(({ id, cssVar }) => {
      const input = document.getElementById(id);
      const valEl = document.getElementById(`${id}Val`);
      wireColorPair(input, valEl, cssVar);
    });

    // --- Hyphenation tuning (requires reload to take effect) ---
    ['hyphMinWordLength', 'hyphLeftmin', 'hyphRightmin'].forEach((id) => {
      const input = document.getElementById(id);
      const valEl = document.getElementById(`${id}Val`);
      input.addEventListener('input', () => {
        valEl.textContent = input.value;
      });
      input.addEventListener('change', () => {
        saveSettings();
        location.reload();
      });
    });

    document.getElementById('allSave').addEventListener('click', () => {
      const md = `# Site Typography Settings

- Text size: ${siteFontSize.value}px
- Line height: ${siteLineHeight.value}
- Letter spacing: ${siteLetterSpacing.value}px
- Color: ${siteColor.value}
- About color: ${document.getElementById('colorAbout').value}
- Archive color: ${document.getElementById('colorArchive').value}
- Event title color: ${document.getElementById('colorEventTitle').value}
- Event text color: ${document.getElementById('colorEventText').value}
- Menu color: ${document.getElementById('colorMenu').value}
- About bg: ${document.getElementById('bgAbout').value}
- Archive bg: ${document.getElementById('bgArchive').value}
- Event bg: ${document.getElementById('bgEvent').value}
`;
      downloadMarkdown('site-typography-settings.md', md);
    });

    // --- Persist typography settings in this browser ---
    const TYPOGRAPHY_STORAGE_KEY = 'typographySettings';
    const SLIDER_IDS = ['siteFontSize', 'siteLineHeight', 'siteLetterSpacing', 'siteColor', 'colorAbout', 'colorArchive', 'colorEventTitle', 'colorEventText', 'colorMenu', 'bgAbout', 'bgArchive', 'bgEvent', 'hyphMinWordLength', 'hyphLeftmin', 'hyphRightmin'];

    function collectSettings() {
      const settings = {};
      SLIDER_IDS.forEach((id) => {
        const el = document.getElementById(id);
        if (el) settings[id] = el.value;
      });
      return settings;
    }

    function saveSettings() {
      localStorage.setItem(TYPOGRAPHY_STORAGE_KEY, JSON.stringify(collectSettings()));
    }

    function applySettings(settings) {
      SLIDER_IDS.forEach((id) => {
        if (settings[id] === undefined) return;
        const el = document.getElementById(id);
        if (!el) return;
        el.value = settings[id];
        el.dispatchEvent(new Event('input'));
      });
    }

    devPanel.addEventListener('input', (e) => {
      if (e.target.matches('input[type="range"], input[type="color"]')) saveSettings();
    });

    document.getElementById('allApply').addEventListener('click', () => {
      const saved = localStorage.getItem(TYPOGRAPHY_STORAGE_KEY);
      if (saved) applySettings(JSON.parse(saved));
    });

    const savedTypography = localStorage.getItem(TYPOGRAPHY_STORAGE_KEY);
    if (savedTypography) {
      try {
        applySettings(JSON.parse(savedTypography));
      } catch (err) {
        // ignore corrupt saved settings
      }
    }
  </script>
</body>
</html>
